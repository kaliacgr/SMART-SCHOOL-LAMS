<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART SCHOOL LAMS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .dashboard {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .stat-card {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 15px;
            flex: 1;
            margin: 0 10px;
            text-align: center;
        }
        #map {
            height: 400px;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Welcome to SMART SCHOOL LAMS</h1>
    <div class="dashboard">
        <div class="stat-card">
            <h2>Total Buses</h2>
            <p id="total-buses">5</p>
        </div>
        <div class="stat-card">
            <h2>Active Routes</h2>
            <p id="active-routes">3</p>
        </div>
        <div class="stat-card">
            <h2>GPS Status</h2>
            <p id="gps-status">Online</p>
        </div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([51.505, -0.09], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Bus simulation feature
        var busMarker = L.marker([51.505, -0.09]).addTo(map);
        var buses = [
            { id: 1, lat: 51.505, lng: -0.09 },
            { id: 2, lat: 51.515, lng: -0.1 },
        ];

        function updateBusMarkers() {
            buses.forEach(bus => {
                busMarker.setLatLng([bus.lat, bus.lng]);
            });
        }

        setInterval(updateBusMarkers, 5000);
    </script>
</body>
</html>
