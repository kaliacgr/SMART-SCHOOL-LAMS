<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.0/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <title>Smart School ERP Dashboard</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition);
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        function showPosition(position) {
            let apiKey = '7039ac6151d3ba3705edc11e850e01a7';
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
            $.get(`http://api.positionstack.com/v1/reverse?access_key=${apiKey}&query=${lat},${lon}`, function(data) {
                $('#location').text(data.data[0].label);
            });
        }
    </script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#" class="text-white text-lg font-bold">Smart School ERP</a>
            <div>
                <ul class="flex space-x-4">
                    <li><a href="#" class="text-white hover:underline">Home</a></li>
                    <li><a href="#" class="text-white hover:underline">Staff</a></li>
                    <li><a href="#" class="text-white hover:underline">Geofence</a></li>
                    <li><a href="#" class="text-white hover:underline">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container mx-auto mt-6">
        <h1 class="text-2xl font-bold">Dashboard</h1>
        <div class="mt-4">
            <button onclick="getLocation()" class="bg-blue-500 text-white py-2 px-4 rounded">Track Staff Location</button>
            <div id="location" class="mt-4 text-lg"></div>
        </div>
        <div class="mt-6">
            <h2 class="text-xl font-semibold">WhatsApp Reminders Panel</h2>
            <!-- Add functionality for sending WhatsApp reminders here -->
        </div>
    </main>
</body>
</html>
